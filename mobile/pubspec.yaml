name: garbage_detection_app
description: GPS-based Garbage Detection System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  
  dio: ^5.4.0
  
  geolocator: ^11.0.0
  geocoding: ^2.2.0
  
  image_picker: ^1.0.7
  
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^1.3.6
  
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  connectivity_plus: ^5.0.2
  
  cached_network_image: ^3.3.1
  
  intl: ^0.19.0
  
  get_it: ^7.6.7
  injectable: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
